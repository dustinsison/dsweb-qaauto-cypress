name: Run QA

on:
  workflow_dispatch:
    inputs:
      site_key:
        description: "Site key"
        required: true
        default: "dustinsison"
      base_url:
        description: "Base URL to test"
        required: true
        default: "https://dustinsison.com"
      response_url:
        description: "Slack response URL"
        required: false
        default: ""

jobs:
  cypress:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: ${{ inputs.base_url }}
