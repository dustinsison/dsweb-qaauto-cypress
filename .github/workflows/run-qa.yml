name: Run QA

on:
  workflow_dispatch:
    inputs:
      site_key:
        description: "Site key"
        required: true
        default: "dustinsison"
      base_url:
        description: "Base URL to test"
        required: true
        default: "https://dustinsison.com"
      response_url:
        description: "Slack response URL for posting the final result"
        required: false
        default: ""

jobs:
  cypress:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: ${{ inputs.base_url }}

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts-${{ inputs.site_key }}
          path: |
            cypress/screenshots
            cypress/videos

      - name: Post result to Slack
        if: ${{ always() && inputs.response_url != '' }}
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESPONSE_URL: ${{ inputs.response_url }}
          SITE_KEY: ${{ inputs.site_key }}
          BASE_URL: ${{ inputs.base_url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node <<'EOF'
          const status = process.env.JOB_STATUS;
          const icon = status === "success" ? ":white_check_mark:" : ":x:";
          const headline =
            status === "success" ? "*Cypress QA run passed*" : "*Cypress QA run failed*";
          const text = [
            `${icon} ${headline}`,
            `*Site:* \`${process.env.SITE_KEY}\``,
            `*URL:* ${process.env.BASE_URL}`,
            `<${process.env.GITHUB_RUN_URL}|View workflow run>`,
          ].join("\n");

          fetch(process.env.RESPONSE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              response_type: "ephemeral",
              text,
            }),
          }).then(async (response) => {
            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Slack response failed: ${response.status} ${body}`);
            }
          }).catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF
